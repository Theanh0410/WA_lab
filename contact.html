<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="icon" href="favicon.ico">

  <link href="https://fonts.googleapis.com/css?family=Montserrat:200;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/nav.css">
</head>
<body>
  <header><div id="nav-placeholder"></div></header>
  
  <main>
    <section class="frame">
      <h1>Contact Me</h1>
      <div class="contact-info">
        <p><strong>Phone:</strong> +84-981134979</p>
        <p><strong>Email:</strong> <a href="mailto:ITCSIU22009@student.hcmiu.edu.vn">ITCSIU22009@student.hcmiu.edu.vn</a></p>
        <p><strong>GitHub:</strong> <a href="https://github.com/Theanh0410" target="_blank">https://github.com/Theanh0410</a></p>
        <p><strong>My Location:</strong> <a href="https://maps.app.goo.gl/fQKLNbFjAeVZ2nhc7">International University - VNU-HCM</a></p>
      </div>

      <div class="map-container">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d2703.9110596530018!2d106.80156549450321!3d10.878463133670865!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3174d8a415a9d221%3A0x550c2b41569376f9!2sInternational%20University%20-%20VNU-HCM!5e1!3m2!1sen!2sus!4v1772376555275!5m2!1sen!2sus"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <form>
        <h2>Send Me a Message</h2>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>

        <label for="urgency">Urgency (1-10):<span id="urgency-value"></span></label>
        <input type="range" id="urgency" name="urgency" min="1" max="10" value="5">

        <label for="file">Attach File:</label>
        <input type="file" id="file" name="file" accept=".pdf,.doc,.docx,.txt,.jpg,.png">

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="3" required></textarea>

        <input type="submit" value="Send Message">
      </form>

    </section>
  </main>

  <footer>
    <p>&copy; The Anh</p>
  </footer>

  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      })
      .catch(error => console.error('Error loading navigation:', error));
  </script>
</body>
</html>
